<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Sendesss | Bio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

:root {
  --rose:    #f4c2c2;
  --lavender:#d8c8f0;
  --sky:     #c2ddf4;
  --mint:    #c2f0e4;
  --cream:   #fdf6f0;
  --dust:    #e8daf5;
  --text:    #5a4a6a;
  --subtext: #9b8aac;
  --white:   #ffffff;
  --card-bg: rgba(255,255,255,0.55);
  --glow:    rgba(216,200,240,0.6);
}

html, body {
  min-height: 100%;
  font-family: 'DM Sans', sans-serif;
  color: var(--text);
  overflow-x: hidden;
  width: 100%;
  position: relative;
}

body {
  background: linear-gradient(135deg, #fce4ec 0%, #ede7f6 30%, #e3f2fd 60%, #e8f5e9 100%);
  background-attachment: fixed;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  min-height: 100vh;
  touch-action: manipulation;
}

.blobs { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
.blob { position: absolute; border-radius: 50%; filter: blur(70px); opacity: 0.45; }
.blob-1 { width: 500px; height: 500px; background: radial-gradient(circle, #f9c6d5, #e8b4f8); top: -100px; left: -120px; animation: drift1 18s ease-in-out infinite; }
.blob-2 { width: 400px; height: 400px; background: radial-gradient(circle, #b8d8f8, #c8b8f8); bottom: -80px; right: -100px; animation: drift2 22s ease-in-out infinite; }
.blob-3 { width: 300px; height: 300px; background: radial-gradient(circle, #c8f0e4, #f0e8c8); top: 40%; left: 50%; transform: translate(-50%,-50%); animation: drift3 16s ease-in-out infinite; }

@keyframes drift1 { 0%,100%{transform:translate(0,0) scale(1);} 50%{transform:translate(40px,30px) scale(1.08);} }
@keyframes drift2 { 0%,100%{transform:translate(0,0) scale(1);} 50%{transform:translate(-30px,-40px) scale(1.06);} }
@keyframes drift3 { 0%,100%{transform:translate(-50%,-50%) scale(1);} 50%{transform:translate(-48%,-52%) scale(1.12);} }

.petal { position: fixed; pointer-events: none; z-index: 0; font-size: 14px; opacity: 0; animation: petalFall linear infinite; }
@keyframes petalFall {
  0%   { transform: translateY(-20px) rotate(0deg); opacity: 0; }
  10%  { opacity: 0.6; }
  90%  { opacity: 0.4; }
  100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
}

body::before {
  content: '';
  position: fixed; inset: 0; z-index: 1; pointer-events: none;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  opacity: 0.35;
}

/* ── ENTER SCREEN ── */
#enter {
  position: fixed; inset: 0; z-index: 999;
  background: linear-gradient(135deg, #fce4ec, #ede7f6, #e3f2fd);
  display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 20px;
  cursor: pointer;
}
#enter .enter-title { font-family: 'Cormorant Garamond', serif; font-size: clamp(2rem, 10vw, 4rem); font-weight: 300; font-style: italic; color: var(--text); letter-spacing: 0.12em; animation: gentlePulse 2.5s ease-in-out infinite; }
#enter .enter-sub { font-size: 0.75rem; letter-spacing: 0.3em; color: var(--subtext); text-transform: uppercase; animation: gentlePulse 2.5s ease-in-out infinite 0.3s; }
#enter .enter-orb { width: clamp(60px, 15vw, 80px); height: clamp(60px, 15vw, 80px); border-radius: 50%; background: linear-gradient(135deg, #f4c2c2, #d8c8f0, #c2ddf4); box-shadow: 0 0 40px rgba(216,200,240,0.6); animation: orbFloat 3s ease-in-out infinite; }
@keyframes gentlePulse { 0%,100%{opacity:1;} 50%{opacity:0.5;} }
@keyframes orbFloat { 0%,100%{transform:translateY(0) scale(1);} 50%{transform:translateY(-12px) scale(1.05);} }

/* ── MAIN CONTAINER ── */
.container { position: relative; z-index: 2; width: 100%; padding: 20px 16px 80px; display: none; justify-content: center; }

/* ── CARD ── */
.profile-card {
  width: 100%; max-width: 440px;
  background: var(--card-bg);
  backdrop-filter: blur(24px) saturate(1.4);
  -webkit-backdrop-filter: blur(24px) saturate(1.4);
  border-radius: 32px;
  border: 1px solid rgba(255,255,255,0.7);
  box-shadow: 0 8px 32px rgba(180,150,220,0.12), 0 2px 8px rgba(180,150,220,0.08), inset 0 1px 0 rgba(255,255,255,0.9);
  padding: clamp(24px, 8vw, 48px) clamp(16px, 5vw, 40px);
  text-align: center;
  opacity: 0; transform: translateY(30px);
  transition: opacity 0.8s ease, transform 0.8s ease;
}
.profile-card.visible { opacity: 1; transform: translateY(0); }

/* ── AVATAR ── */
.avatar-wrap { position: relative; display: inline-block; margin-bottom: 18px; }
.avatar-ring { position: absolute; inset: -8px; border-radius: 50%; background: conic-gradient(from 0deg, #f4c2c2, #d8c8f0, #c2ddf4, #c2f0e4, #f4c2c2); animation: ringRotate 6s linear infinite; z-index: 0; }
@keyframes ringRotate { to { transform: rotate(360deg); } }
.avatar-ring-inner { position: absolute; inset: -4px; border-radius: 50%; background: var(--card-bg); z-index: 1; }
.avatar { position: relative; z-index: 2; width: clamp(80px, 25vw, 130px); height: clamp(80px, 25vw, 130px); border-radius: 50%; object-fit: cover; display: block; cursor: pointer; }
.avatar-glow { position: absolute; inset: -16px; border-radius: 50%; background: radial-gradient(circle, rgba(216,200,240,0.4), transparent 70%); z-index: 0; animation: glowPulse 3s ease-in-out infinite; }

/* ── NAME & BIO ── */
.name { font-family: 'Cormorant Garamond', serif; font-size: clamp(1.8rem, 7vw, 2.6rem); font-weight: 300; font-style: italic; letter-spacing: 0.04em; background: linear-gradient(135deg, #c084b8, #8b8bcc, #6baed4); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin-bottom: 6px; }
.bio { font-size: clamp(0.8rem, 3.5vw, 0.95rem); color: var(--subtext); line-height: 1.6; font-weight: 300; margin-bottom: 8px; }
#typing { font-size: 0.8rem; color: #b08ab8; font-style: italic; min-height: 1.4em; letter-spacing: 0.02em; }
.divider { height: 1px; margin: 20px 0; background: linear-gradient(90deg, transparent, rgba(200,180,230,0.4), transparent); }

/* ── SOCIAL ICONS ── */
.social-grid { display: flex; justify-content: center; gap: clamp(8px, 3vw, 16px); flex-wrap: wrap; margin: 4px 0; }
.icon-btn { position: relative; display: flex; align-items: center; justify-content: center; width: clamp(48px, 15vw, 64px); height: clamp(48px, 15vw, 64px); border-radius: 20px; background: rgba(255,255,255,0.6); border: 1px solid rgba(255,255,255,0.8); cursor: pointer; transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1); touch-action: manipulation; }
.icon-btn i { font-size: clamp(1.1rem, 5vw, 1.5rem); color: var(--text); z-index: 1; }
.icon-btn img { width: clamp(24px, 8vw, 34px); height: clamp(24px, 8vw, 34px); object-fit: contain; z-index: 1; }

/* ── MUSIC PLAYER ── */
.player-wrap { background: rgba(255,255,255,0.45); border: 1px solid rgba(255,255,255,0.75); border-radius: 24px; padding: clamp(14px, 4vw, 20px); }
.player-header { display: flex; align-items: center; gap: 14px; margin-bottom: 14px; }
.album-art { width: 50px; height: 50px; border-radius: 14px; flex-shrink: 0; background: linear-gradient(135deg, #f4c2c2, #d8c8f0, #c2ddf4); display: flex; align-items: center; justify-content: center; font-size: 1.3rem; }
.player-info { text-align: left; flex: 1; min-width: 0; }
#song-title { font-family: 'Cormorant Garamond', serif; font-size: 1rem; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
#song-artist { font-size: 0.7rem; color: var(--subtext); margin-top: 2px; }
.progress-container { height: 6px; background: rgba(180,150,220,0.15); border-radius: 10px; cursor: pointer; position: relative; margin: 10px 0; }
.progress-bar { height: 100%; width: 0%; background: linear-gradient(90deg, #f4c2c2, #d8c8f0, #c2ddf4); border-radius: 10px; pointer-events: none; }
.time-row { display:flex; justify-content:space-between; font-size:0.65rem; color:var(--subtext); margin-top: 4px; }
.player-controls { display: flex; justify-content: center; align-items: center; gap: clamp(15px, 8vw, 30px); margin-top: 10px; }
.ctrl-btn { background: none; border: none; cursor: pointer; color: var(--subtext); font-size: 1.2rem; padding: 10px; }
.ctrl-btn.play-main { width: 48px; height: 48px; background: linear-gradient(135deg, #e8c4f4, #c4d4f4); border-radius: 50%; color: white; display: flex; align-items: center; justify-content: center; }

/* ── MODAL ── */
.modal { position:fixed; inset:0; background:rgba(240,230,255,0.4); display:none; justify-content:center; align-items:flex-end; z-index:1000; }
.modal.show { display: flex; backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px); }
.modal-content { width:100%; max-height:90vh; overflow-y:auto; padding: 25px 20px 40px; border-radius: 32px 32px 0 0; background: rgba(255,255,255,0.95); transform:translateY(100%); transition:transform .4s cubic-bezier(0.34,1.56,0.64,1); }
.modal.show .modal-content { transform:translateY(0); }
@media (min-width:600px) { .modal { align-items:center; padding:20px; } .modal-content { border-radius:32px; max-width:480px; transform: scale(0.9); } .modal.show .modal-content { transform: scale(1); } }

/* ── LIGHTBOX (BIG PICTURE) ── */
.lightbox { position: fixed; inset: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); display: none; align-items: center; justify-content: center; z-index: 2000; padding: 20px; }
.lightbox.show { display: flex; animation: fadeIn 0.3s ease; }
.lightbox img { max-width: 100%; max-height: 80vh; object-fit: contain; border-radius: 12px; transform: scale(0.9); transition: transform 0.3s ease; }
.lightbox.show img { transform: scale(1); }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

/* ── UPLOAD SECTION ── */
.upload-drop-zone { border: 2px dashed rgba(200,180,230,0.5); border-radius: 18px; padding: 20px; background: rgba(255,255,255,0.5); position: relative; text-align: center; margin: 15px 0; }
.upload-drop-zone input[type="file"] { position: absolute; inset: 0; opacity: 0; width: 100%; }
.drop-text { font-size: 0.8rem; color: var(--subtext); }

.modal-main-img-wrap { width: 100%; border-radius: 18px; overflow: hidden; margin: 10px 0; background: #eee; min-height: 100px; display: flex; align-items: center; }
.modal-main-img-wrap img { width: 100%; display: block; }

.preview { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-top:15px; }
.preview-item { position:relative; aspect-ratio: 1; }
.preview-item img { width:100%; height:100%; object-fit:cover; border-radius:12px; }
.preview-item .del-btn { position:absolute; top:4px; right:4px; background:white; border-radius:50%; width:22px; height:22px; border:none; font-size:14px; }

.close-btn { width: 100%; margin-top:20px; padding:15px; background: #f0e8f8; border: none; border-radius: 16px; color: var(--text); font-weight: 500; }

.stagger { opacity:0; transform:translateY(16px); transition: 0.5s ease; }
.stagger.in { opacity:1; transform:translateY(0); }
</style>
</head>
<body>

<div class="blobs"><div class="blob blob-1"></div><div class="blob blob-2"></div><div class="blob blob-3"></div></div>

<div id="enter">
  <div class="enter-orb"></div>
  <div class="enter-title">sendesss</div>
  <div class="enter-sub">✦ tap to enter ✦</div>
</div>

<div class="container" id="main">
  <div class="profile-card" id="card">
    <div class="avatar-wrap stagger">
      <div class="avatar-glow"></div><div class="avatar-ring"></div><div class="avatar-ring-inner"></div>
      <img src="https://i.pinimg.com/736x/41/74/95/41749585ef86481c7c6d54d3c8388f57.jpg" class="avatar" alt="Avatar" id="avatarImg" onclick="showBigImg(this.src)">
    </div>

    <div class="name stagger">Sendesss</div>
    <p class="bio stagger">Hello there, Watashiwa Sendesss.<br>A fucking nerd.</p>
    <p id="typing" class="stagger"></p>

    <div class="divider stagger"></div>

    <div class="social-grid stagger">
      <div class="icon-btn" onclick="window.open('https://www.roblox.com/users/7873416614/profile','_blank')"><i class="fa-solid fa-cube"></i></div>
      <div class="icon-btn" onclick="window.open('https://discord.com/users/1282944168087519286')"><i class="fa-brands fa-discord"></i></div>
      <div class="icon-btn" onclick="window.open('https://www.tiktok.com/@sendes.s','_blank')"><i class="fa-brands fa-tiktok"></i></div>
      <div class="icon-btn" onclick="openModal('ml')"><img src="https://play-lh.googleusercontent.com/eOSTyn3tnJrezNp0pBV-grARGI8xWM0ylM0fZYoV-ZFaY52wCjyRwn0uIsWrAhQjzg"></div>
      <div class="icon-btn" onclick="openModal('genshin')"><img src="https://upload.wikimedia.org/wikipedia/en/5/5d/Genshin_Impact_logo.svg"></div>
    </div>

    <div class="divider stagger"></div>

    <div class="player-wrap stagger">
      <div class="player-header">
        <div class="album-art" id="albumArt">🎵</div>
        <div class="player-info"><div id="song-title">Gabriela</div><div id="song-artist">KATSEYE</div></div>
      </div>
      <div class="progress-container" id="progressBar"><div id="bar" class="progress-bar"></div></div>
      <div class="time-row"><span id="time-cur">0:00</span><span id="time-dur">0:00</span></div>
      <div class="player-controls">
        <button class="ctrl-btn" onclick="prev()"><i class="fa-solid fa-backward-step"></i></button>
        <button class="ctrl-btn play-main" onclick="togglePlay()"><i class="fa-solid fa-play" id="playIcon"></i></button>
        <button class="ctrl-btn" onclick="next()"><i class="fa-solid fa-forward-step"></i></button>
      </div>
    </div>
  </div>
</div>

<div id="sc-players" style="position:absolute; visibility:hidden; pointer-events:none;">
  <iframe id="sc-0" src="https://w.soundcloud.com/player/?url=https%3A//soundcloud.com/katseye-music/gabriela&auto_play=false"></iframe>
  <iframe id="sc-1" src="https://w.soundcloud.com/player/?url=https%3A//soundcloud.com/kehlanimusic/folded&auto_play=false"></iframe>
</div>

<div class="lightbox" id="lightbox" onclick="closeBigImg()"><img id="lightboxImg" src=""></div>

<div class="modal" id="modal">
  <div class="modal-content">
    <h2 id="modalTitle"></h2>
    <div class="modal-main-img-wrap"><img id="modalImg" onclick="showBigImg(this.src)"></div>
    <div class="upload-drop-zone">
      <input type="file" accept="image/*" onchange="handleFileUpload(event)">
      <div class="drop-text">Tap to upload image</div>
    </div>
    <div class="preview" id="preview"></div>
    <button class="close-btn" onclick="closeModal()">Close</button>
  </div>
</div>

<script src="https://w.soundcloud.com/player/api.js"></script>
<script>
// Logic preserved exactly as requested
const petalEmoji = ['🌸','🌺','🌷'];
function spawnPetal() {
  const p = document.createElement('div'); p.className = 'petal'; p.textContent = petalEmoji[Math.floor(Math.random()*3)];
  p.style.left = Math.random()*100+'vw'; p.style.animationDuration = (8+Math.random()*10)+'s';
  document.body.appendChild(p); setTimeout(()=>p.remove(), 15000);
}
setInterval(spawnPetal, 3000);

document.getElementById('enter').addEventListener('click', () => {
  document.getElementById('enter').style.display = 'none';
  document.getElementById('main').style.display = 'flex';
  setTimeout(() => {
    document.getElementById('card').classList.add('visible');
    document.querySelectorAll('.stagger').forEach((el, i) => setTimeout(() => el.classList.add('in'), i * 100));
  }, 50);
});

const phrases = ["✦ bioderm na blue", "✦ dont beg because to beg is water", "✦ biogesic"];
let pIdx=0, cIdx=0, deleting=false;
function type() {
  const p = phrases[pIdx];
  document.getElementById('typing').textContent = deleting ? p.slice(0, --cIdx) : p.slice(0, ++cIdx);
  if(!deleting && cIdx===p.length) { deleting=true; setTimeout(type, 2000); return; }
  if(deleting && cIdx===0) { deleting=false; pIdx=(pIdx+1)%phrases.length; }
  setTimeout(type, deleting ? 50 : 100);
}
type();

function showBigImg(src) { document.getElementById('lightboxImg').src=src; document.getElementById('lightbox').classList.add('show'); }
function closeBigImg() { document.getElementById('lightbox').classList.remove('show'); }

let currentGame = null;
function openModal(game) {
  currentGame = game; document.getElementById('modal').classList.add('show');
  document.getElementById('modalTitle').innerText = game.toUpperCase();
  renderGallery();
}
function closeModal() { document.getElementById('modal').classList.remove('show'); }

function handleFileUpload(e) {
  const file = e.target.files[0]; if(!file) return;
  if(prompt("Enter passcode:") !== "1234") return alert("Wrong code");
  const reader = new FileReader();
  reader.onload = (ev) => {
    let imgs = JSON.parse(localStorage.getItem('gal_'+currentGame) || '[]');
    imgs.push(ev.target.result); localStorage.setItem('gal_'+currentGame, JSON.stringify(imgs));
    renderGallery();
  };
  reader.readAsDataURL(file);
}

function renderGallery() {
  const imgs = JSON.parse(localStorage.getItem('gal_'+currentGame) || '[]');
  const main = document.getElementById('modalImg');
  main.src = imgs[imgs.length-1] || ''; main.style.display = imgs.length ? 'block' : 'none';
  const prev = document.getElementById('preview'); prev.innerHTML = '';
  imgs.forEach((s, i) => {
    const div = document.createElement('div'); div.className='preview-item';
    div.innerHTML = `<img src="${s}" onclick="document.getElementById('modalImg').src='${s}'"><button class="del-btn" onclick="delImg(${i})">×</button>`;
    prev.appendChild(div);
  });
}
function delImg(i) {
  if(prompt("Code:") !== "1234") return;
  let imgs = JSON.parse(localStorage.getItem('gal_'+currentGame));
  imgs.splice(i, 1); localStorage.setItem('gal_'+currentGame, JSON.stringify(imgs));
  renderGallery();
}

// Player Logic
const songs = [{t:'Gabriela', a:'KATSEYE', e:'🌸', id:'sc-0'}, {t:'Folded', a:'Kehlani', e:'🌷', id:'sc-1'}];
let idx=0, widgets=[], activeW=null, timer=null;

function loadSong() {
  const s = songs[idx]; document.getElementById('song-title').textContent=s.t;
  document.getElementById('song-artist').textContent=s.a; document.getElementById('albumArt').textContent=s.e;
  activeW = widgets[idx]; activeW.play();
}
function togglePlay() { activeW.isPaused(p => p ? activeW.play() : activeW.pause()); }
function next() { activeW.pause(); idx=(idx+1)%songs.length; loadSong(); }
function prev() { activeW.pause(); idx=(idx-1+songs.length)%songs.length; loadSong(); }

window.onload = () => {
  songs.forEach((s, i) => {
    const w = SC.Widget(document.getElementById(s.id));
    widgets.push(w);
    w.bind(SC.Widget.Events.PLAY, () => {
      document.getElementById('playIcon').className = 'fa-solid fa-pause';
      timer = setInterval(() => {
        w.getPosition(p => w.getDuration(d => {
          document.getElementById('bar').style.width = (p/d*100)+'%';
          document.getElementById('time-cur').textContent = Math.floor(p/60000)+':'+String(Math.floor((p%60000)/1000)).padStart(2,'0');
          document.getElementById('time-dur').textContent = Math.floor(d/60000)+':'+String(Math.floor((d%60000)/1000)).padStart(2,'0');
        }));
      }, 1000);
    });
    w.bind(SC.Widget.Events.PAUSE, () => { document.getElementById('playIcon').className = 'fa-solid fa-play'; clearInterval(timer); });
    if(i===0) activeW = w;
  });
};

document.getElementById('progressBar').onclick = (e) => {
  const rect = e.currentTarget.getBoundingClientRect();
  activeW.getDuration(d => activeW.seekTo(((e.clientX - rect.left)/rect.width)*d));
};
</script>
</body>
</html>
